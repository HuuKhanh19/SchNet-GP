# =============================================================================
# CONAN-SchNet: Base Configuration (Hydra)
# =============================================================================

defaults:
  - _self_

hydra:
  run:
    dir: .
  output_subdir: null

# ___ Global Settings _________________________________________________________
dataset_name: esol
random_seed_train: 0
gpu: 0

# ___ Experiment ______________________________________________________________
experiment:
  output_dir: "experiments"
  log_level: "INFO"
  verbose: false

# ___ Dataset Definitions ____________________________________________________
datasets:
  esol:
    name: "esol"
    file: "refined_ESOL.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  freesolv:
    name: "freesolv"
    file: "refined_FreeSolv.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  lipo:
    name: "lipo"
    file: "refined_Lipophilicity.csv"
    smiles_column: "smiles"
    target_column: "measured"
    task_type: "regression"
    metric: "rmse"

  bace:
    name: "bace"
    file: "refined_BACE.csv"
    smiles_column: "smiles"
    target_column: "class"
    task_type: "classification"
    metric: "auc"

# ___ Data / Splitting _______________________________________________________
data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  split_ratio: [0.8, 0.1, 0.1]
  split_method: "random_scaffold"
  random_seed_split: 0

# ___ Conformer Generation ___________________________________________________
conformer:
  num_conformers: 10
  max_attempts: 500
  prune_rms_thresh: 0.0
  use_random_coords: false
  optimize_mmff: true
  random_seed_gen: 42

# ___ SchNet Model ___________________________________________________________
schnet:
  n_atom_basis: 128
  n_interactions: 6
  n_rbf: 50
  cutoff: 5.0
  n_filters: 128
  atomref: null

# ___ Pretrained Backbone ____________________________________________________
pretrain:
  use_qm9_pretrained: true
  qm9_target: 7
  cache_dir: "pretrained"

# ___ Training (Step 1 _ Adam baseline) ______________________________________
training:
  epochs: 300
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.00001
  scheduler: "reduce_on_plateau"
  scheduler_patience: 25
  scheduler_factor: 0.5
  early_stopping_patience: 100
  save_checkpoints: true
  gradient_clip: 1.0